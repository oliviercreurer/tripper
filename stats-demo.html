<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stats Component Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFFDF6; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

/* =========================================================
   DESIGN TOKENS (from tokens.json — light mode)
   ========================================================= */
const T = {
  // Backgrounds
  bgPrimary:      "#FFFDF6",   // background/base/primary
  bgSecondary:    "#F7F6ED",   // background/base/secondary
  bgInputDefault: "#F7F6ED",   // background/input/default

  // Borders
  borderDefault:  "#DAD8CE",   // base-150

  // Text
  textDefault:    "#100F0F",   // base-1000 (used for headings, body where not specified)
  textSubtle:     "#6F6E69",   // text/subtle (base-600)
  textSubtlest:   "#B7B5AC",   // text/subtlest (base-300)

  // Semantic text colors (for metric numbers)
  textDanger:     "#AF3029",   // text/danger (red-600)
  textWarning:    "#AD8301",   // text/warning (yellow-600)
  textTeal:       "#24837B",   // teal-600

  // Chart line strokes (from Figma vectors)
  lineRed:        "#F89A8A",   // red-200
  lineYellow:     "#ECCB60",   // yellow-200
  lineTeal:       "#87D3C3",   // teal-200

  // Fonts
  fontBody:       "'Outfit', system-ui, sans-serif",
  fontTechnical:  "'JetBrains Mono', monospace",
};

/* =========================================================
   DEMO DATA GENERATION
   ========================================================= */
function generateDailyData(days, metrics, seed = 1) {
  const data = [];
  for (let d = 1; d <= days; d++) {
    const row = { day: d };
    metrics.forEach((m, i) => {
      const base = [45, 30, 15][i % 3];
      const noise = Math.sin(seed * 13 + d * (i + 1) * 0.7) * base * 0.6;
      const trend = Math.sin((d / days) * Math.PI * 1.2 + i) * base * 0.4;
      row[m.key] = Math.max(1, Math.round(base + noise + trend));
    });
    data.push(row);
  }
  return data;
}

function generateOperatorData(operators, metrics, seed = 1) {
  return operators.map((op, oi) => {
    const row = { name: op };
    metrics.forEach((m, i) => {
      const base = [100, 42, 9][i % 3];
      const variance = Math.sin(seed * 7 + oi * 3 + i * 5) * base * 0.5;
      row[m.key] = Math.max(1, Math.round(base + variance));
    });
    return row;
  });
}

const METRICS = [
  { key: "impressions", label: "Impressions", lineColor: T.lineRed,    textColor: T.textDanger  },
  { key: "views",       label: "Views",       lineColor: T.lineYellow, textColor: T.textWarning },
  { key: "clicks",      label: "Clicks",      lineColor: T.lineTeal,   textColor: T.textTeal    },
];

const OPERATORS = [
  "Fairfield Bakery", "Mariposa Café", "Lot 49",
  "Pomeroy Hotel", "The Juiced Moose", "Stanton Bar",
];

const SOURCES = [
  { value: "all", label: "All widgets" },
  { value: "culinary", label: "Sipping Tour: Culinary Page Embed" },
  { value: "whereabouts", label: "Sipping Tour: Whereabouts Webpage" },
];

const TIMEFRAMES = [
  { value: "month", label: "This month", days: 31 },
  { value: "week",  label: "This week",  days: 7  },
  { value: "year",  label: "This year",  days: 12 },
];

const MONTH_LABELS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SEEDS = { all: 1, culinary: 2, whereabouts: 3 };
const TF_SEEDS = { month: 0, week: 10, year: 20 };

/* =========================================================
   ANIMATED NUMBER
   ========================================================= */
function AnimatedNumber({ value, duration = 600 }) {
  const [display, setDisplay] = useState(0);
  const prevRef = useRef(0);

  useEffect(() => {
    const from = prevRef.current;
    const to = value;
    const start = performance.now();
    let raf;
    function tick(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(Math.round(from + (to - from) * eased));
      if (progress < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    prevRef.current = value;
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);

  return <>{display.toLocaleString()}</>;
}

/* =========================================================
   DROPDOWN (matching Figma Input component)
   ========================================================= */
function Dropdown({ label, options, value, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const selected = options.find((o) => o.value === value);

  return (
    <div ref={ref} style={{ flex: 1, minWidth: 0 }}>
      <p style={{
        fontFamily: T.fontBody, fontSize: 14, fontWeight: 500,
        color: T.textSubtle, marginBottom: 4,
      }}>{label}</p>
      <div style={{ position: "relative" }}>
        <button
          onClick={() => setOpen(!open)}
          style={{
            width: "100%", padding: "10px 36px 10px 12px",
            fontFamily: T.fontBody, fontSize: 16, fontWeight: 400,
            color: T.textDefault, background: T.bgInputDefault,
            border: `1px solid ${T.borderDefault}`, borderRadius: 8,
            textAlign: "left", cursor: "pointer", outline: "none",
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}
        >
          {selected?.label}
          <span style={{
            position: "absolute", right: 12, top: "50%",
            transform: `translateY(-50%) rotate(${open ? 180 : 0}deg)`,
            transition: "transform 200ms", fontSize: 11, color: T.textSubtle,
          }}>&#x25BC;</span>
        </button>
        {open && (
          <div style={{
            position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0,
            background: "#fff", border: `1px solid ${T.borderDefault}`,
            borderRadius: 8, boxShadow: "0 4px 12px rgba(0,0,0,0.08)",
            zIndex: 10, overflow: "hidden",
          }}>
            {options.map((opt) => (
              <button
                key={opt.value}
                onClick={() => { onChange(opt.value); setOpen(false); }}
                style={{
                  width: "100%", padding: "10px 12px",
                  fontFamily: T.fontBody, fontSize: 14,
                  fontWeight: opt.value === value ? 600 : 400,
                  color: T.textDefault,
                  background: opt.value === value ? T.bgSecondary : "transparent",
                  border: "none", textAlign: "left", cursor: "pointer",
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                }}
              >{opt.label}</button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* =========================================================
   CUSTOM SVG CHART (matching Figma exactly)
   ========================================================= */
function StatsChart({ data, metrics, timeframe }) {
  const containerRef = useRef(null);
  const [width, setWidth] = useState(680);
  const chartHeight = 200;
  const tickLineHeight = 20;    // height of vertical tick lines below chart
  const labelHeight = 20;       // space for labels below tick lines
  const totalHeight = chartHeight + tickLineHeight + labelHeight;
  const paddingLeft = 0;
  const paddingRight = 0;

  // Responsive width
  useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) setWidth(e.contentRect.width);
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  const labels = data.map((d) =>
    timeframe === "year" ? MONTH_LABELS[d.day - 1] : String(d.day)
  );

  const n = data.length;
  const colWidth = (width - paddingLeft - paddingRight) / n;

  // Y scale
  const allValues = data.flatMap(d => metrics.map(m => d[m.key]));
  const maxVal = Math.max(...allValues) * 1.15;

  // Build path for each metric
  function buildPath(metric) {
    return data.map((d, i) => {
      const x = paddingLeft + colWidth * i + colWidth / 2;
      const y = chartHeight - (d[metric.key] / maxVal) * chartHeight;
      return `${i === 0 ? "M" : "L"} ${x} ${y}`;
    }).join(" ");
  }

  // Animation: use CSS transition on path via key trick — we'll use stroke-dashoffset
  const [animKey, setAnimKey] = useState(0);
  const prevDataRef = useRef(null);

  useEffect(() => {
    setAnimKey(k => k + 1);
    prevDataRef.current = data;
  }, [data]);

  return (
    <div ref={containerRef} style={{ width: "100%" }}>
      <svg
        width={width}
        height={totalHeight}
        viewBox={`0 0 ${width} ${totalHeight}`}
        style={{ display: "block", overflow: "visible" }}
      >
        {/* Vertical tick lines — one per data point */}
        {labels.map((label, i) => {
          const x = paddingLeft + colWidth * i + colWidth / 2;
          return (
            <g key={i}>
              <line
                x1={x} y1={chartHeight}
                x2={x} y2={chartHeight + tickLineHeight}
                stroke={T.borderDefault}
                strokeWidth={1}
              />
              <text
                x={x}
                y={chartHeight + tickLineHeight + 14}
                textAnchor="middle"
                fill={T.textSubtlest}
                fontFamily={T.fontTechnical}
                fontSize={12}
                fontWeight={500}
              >
                {label}
              </text>
            </g>
          );
        })}

        {/* Chart lines */}
        {metrics.map((m) => {
          const path = buildPath(m);
          return (
            <path
              key={m.key + "-" + animKey}
              d={path}
              fill="none"
              stroke={m.lineColor}
              strokeWidth={3}
              strokeLinecap="round"
              strokeLinejoin="round"
              style={{
                strokeDasharray: 2000,
                strokeDashoffset: 2000,
                animation: `drawLine 800ms ease-out forwards`,
              }}
            />
          );
        })}
      </svg>

      <style>{`
        @keyframes drawLine {
          to { stroke-dashoffset: 0; }
        }
      `}</style>
    </div>
  );
}

/* =========================================================
   METRIC CARD
   ========================================================= */
function MetricCard({ metric, total }) {
  return (
    <div style={{
      flex: 1, padding: "12px 16px",
      background: T.bgSecondary,
      border: `1px solid ${T.borderDefault}`, borderRadius: 8,
    }}>
      <p style={{
        fontFamily: T.fontTechnical, fontSize: 16, fontWeight: 500,
        color: metric.textColor, margin: 0,
      }}>
        <AnimatedNumber value={total} />
      </p>
      <p style={{
        fontFamily: T.fontBody, fontSize: 12, fontWeight: 500,
        color: T.textSubtle, margin: "2px 0 0 0",
      }}>{metric.label}</p>
    </div>
  );
}

/* =========================================================
   OPERATOR TABLE
   ========================================================= */
function OperatorTable({ operators, metrics }) {
  return (
    <div>
      <h3 style={{
        fontFamily: T.fontBody, fontSize: 16, fontWeight: 600,
        color: T.textDefault, margin: "0 0 4px 0",
      }}>Stats by operator</h3>
      <p style={{
        fontFamily: T.fontBody, fontSize: 14, fontWeight: 400,
        color: T.textSubtle, margin: "0 0 16px 0",
      }}>A breakdown of stats for operator featured in this itinerary.</p>

      <div style={{ overflow: "hidden" }}>
        {/* Header row */}
        <div style={{
          display: "flex",
          background: T.bgSecondary,
        }}>
          <div style={{
            flex: 2, padding: "10px 16px",
            fontFamily: T.fontBody, fontSize: 14, fontWeight: 600,
            color: T.textSubtlest,
          }}>Name</div>
          {metrics.map((m) => (
            <div key={m.key} style={{
              flex: 1, padding: "10px 16px",
              fontFamily: T.fontBody, fontSize: 14, fontWeight: 600,
              color: T.textSubtlest,
            }}>{m.label}</div>
          ))}
        </div>

        {/* Data rows */}
        {operators.map((op, i) => (
          <div key={op.name} style={{
            display: "flex",
            background: T.bgSecondary,
            borderTop: `1px solid ${T.borderDefault}`,
          }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#EDECD9"}
            onMouseLeave={(e) => e.currentTarget.style.background = T.bgSecondary}
          >
            <div style={{
              flex: 2, padding: "12px 16px",
              fontFamily: T.fontBody, fontSize: 14, fontWeight: 500,
              color: T.textDefault,
            }}>{op.name}</div>
            {metrics.map((m) => (
              <div key={m.key} style={{
                flex: 1, padding: "12px 16px",
                fontFamily: T.fontTechnical, fontSize: 12, fontWeight: 500,
                color: T.textDefault,
              }}>{op[m.key].toLocaleString()}</div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* =========================================================
   MAIN COMPONENT
   ========================================================= */
function StatsComponent() {
  const [source, setSource] = useState("all");
  const [timeframe, setTimeframe] = useState("month");

  const tf = TIMEFRAMES.find((t) => t.value === timeframe);
  const seed = SEEDS[source] + TF_SEEDS[timeframe];

  const dailyData = useMemo(
    () => generateDailyData(tf.days, METRICS, seed),
    [source, timeframe]
  );

  const operatorData = useMemo(
    () => generateOperatorData(OPERATORS, METRICS, seed),
    [source, timeframe]
  );

  const totals = useMemo(() => {
    const t = {};
    METRICS.forEach((m) => {
      t[m.key] = operatorData.reduce((sum, op) => sum + op[m.key], 0);
    });
    return t;
  }, [operatorData]);

  return (
    <div style={{
      fontFamily: T.fontBody, background: T.bgPrimary,
      minHeight: "100vh", display: "flex", justifyContent: "center",
      padding: "40px 20px",
    }}>
      <div style={{
        width: "100%", maxWidth: 720, background: T.bgPrimary,
        border: `1px solid ${T.borderDefault}`, borderRadius: 12,
        padding: 20, display: "flex", flexDirection: "column", gap: 24,
      }}>
        {/* Filters */}
        <div style={{ display: "flex", gap: 12 }}>
          <Dropdown label="Source(s)" options={SOURCES} value={source} onChange={setSource} />
          <Dropdown
            label="Timeframe"
            options={TIMEFRAMES.map((t) => ({ value: t.value, label: t.label }))}
            value={timeframe} onChange={setTimeframe}
          />
        </div>

        {/* Chart */}
        <StatsChart data={dailyData} metrics={METRICS} timeframe={timeframe} />

        {/* Summary Cards */}
        <div style={{ display: "flex", gap: 12 }}>
          {METRICS.map((m) => (
            <MetricCard key={m.key} metric={m} total={totals[m.key]} />
          ))}
        </div>

        {/* Operator Table */}
        <OperatorTable operators={operatorData} metrics={METRICS} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StatsComponent />);
</script>
</body>
</html>
